<script>
  // Ambil data dari URL Parameter (dari index.html)
  const urlParams = new URLSearchParams(window.location.search);
  const qty = parseInt(urlParams.get('qty') || '0');
  const total = parseInt(urlParams.get('total') || '0');
  const namaTiket = decodeURIComponent(urlParams.get('nama') || 'Penambahan Tiket');
  const harga = parseInt(urlParams.get('harga') || '0');

  const namaEl = document.getElementById('nama');
  const identitasEl = document.getElementById('identitas');
  const nomorIdEl = document.getElementById('nomorId');
  const emailEl = document.getElementById('email');
  const waEl = document.getElementById('wa');
  const alamatEl = document.getElementById('alamat');
  const setuju1El = document.getElementById('setuju1');
  const setuju2El = document.getElementById('setuju2');
  const loadingEl = document.getElementById('loading');
  const lanjutBtn = document.getElementById('lanjut');

  // Tampilkan data ke layar
  document.getElementById('totalBayar').innerText = 'Rp ' + total.toLocaleString('id-ID');
  document.getElementById('jumlahTiket').innerText = qty;
  
  const subTotal = qty * harga;
  document.getElementById('detailTiket').innerHTML = `<div class="summary-row"><span>${namaTiket} (${qty}x)</span><strong>Rp ${subTotal.toLocaleString('id-ID')}</strong></div>`;
  document.getElementById('jenisTiket').innerText = `${namaTiket} (${qty})`;

  // Simpan Draft Form ke LocalStorage (Opsional, jika localStorage mendukung)
  function saveDraft() {
    try {
      localStorage.setItem('draft_nama', namaEl.value);
      localStorage.setItem('draft_identitas', identitasEl.value);
      localStorage.setItem('draft_nomorId', nomorIdEl.value);
      localStorage.setItem('draft_email', emailEl.value);
      localStorage.setItem('draft_wa', waEl.value);
      localStorage.setItem('draft_alamat', alamatEl.value);
    } catch(e) {}
  }
  function restoreDraft() {
    try {
      namaEl.value = localStorage.getItem('draft_nama') || '';
      identitasEl.value = localStorage.getItem('draft_identitas') || '';
      nomorIdEl.value = localStorage.getItem('draft_nomorId') || '';
      emailEl.value = localStorage.getItem('draft_email') || '';
      waEl.value = localStorage.getItem('draft_wa') || '';
      alamatEl.value = localStorage.getItem('draft_alamat') || '';
    } catch(e) {}
  }
  restoreDraft();

  [namaEl, identitasEl, nomorIdEl, emailEl, waEl, alamatEl].forEach(el => {
    el.addEventListener('input', saveDraft);
    el.addEventListener('change', saveDraft);
  });

  lanjutBtn.onclick = function() {
    const wajib = [namaEl, identitasEl, nomorIdEl, emailEl, waEl, alamatEl];
    let isValid = true;
    wajib.forEach(field => field.classList.remove('error'));

    for (const field of wajib) {
      if (!field.value.trim()) {
        field.classList.add('error');
        isValid = false;
      }
    }

    if (!isValid) {
      alert('Mohon lengkapi semua data wajib (berwarna merah).');
      const firstError = document.querySelector('.error');
      if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    if (!setuju1El.checked || !setuju2El.checked) {
      alert('Harap centang seluruh kotak persetujuan.');
      return;
    }

    loadingEl.classList.add('active');
    lanjutBtn.disabled = true;
    lanjutBtn.innerText = 'Memproses...';

    // Siapkan data untuk dikirim ke Formspree & QRIS
    const orderData = {
      nama: namaEl.value, wa: waEl.value, email: emailEl.value,
      identitas: identitasEl.value, nomor_id: nomorIdEl.value, alamat: alamatEl.value,
      jenis_tiket: namaTiket, jumlah_tiket: qty, total_bayar: total
    };

    try {
      localStorage.setItem('etatix_order', JSON.stringify({
        nama: namaEl.value, wa: waEl.value,
        cart: { items: [{ jenis: namaTiket, qty: qty, harga: harga }], totalQty: qty, totalPrice: total }
      }));
    } catch(e) {}

    // Kirim data ke Formspree
    fetch('https://formspree.io/f/mojojdpl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(orderData)
    }).catch(e => console.log('Formspree error:', e));

    // Langsung redirect ke qris.html (bawa parameter juga sebagai cadangan)
    const qrisParams = new URLSearchParams({
      nama: namaEl.value, wa: waEl.value, jenis: namaTiket, qty: qty, total: total
    });
    window.location.href = 'qris.html?' + qrisParams.toString();
  };
</script>
